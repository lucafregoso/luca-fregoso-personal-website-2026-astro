# Gitleaks configuration for ai-engineering
# https://github.com/gitleaks/gitleaks

title = "ai-engineering gitleaks config"

[extend]
# Use the default gitleaks rules as the base
useDefault = true

[allowlist]
description = "Global allowlist — paths only, never regex/secret-string suppressions"
# RULE (Article XII §4): allowlist paths must be EXPLICIT files, never
# wildcards. A pattern like `\.ai-engineering/state/.*\.json$` masks any
# future state-file leak. Add new state files to this list one-by-one.
# Real-secret findings must flow through the risk-acceptance ledger
# (`ai-eng risk accept --finding-id <rule_id>`), never via inline
# allowlist regex. See Article XII of CONSTITUTION.md.
paths = [
  # Framework state files known to contain non-secret structured data.
  '''\.ai-engineering/state/decision-store\.json$''',
  '''\.ai-engineering/state/ownership-map\.json$''',
  '''\.ai-engineering/state/install-state\.json$''',
  '''\.ai-engineering/state/hooks-manifest\.json$''',
  '''\.ai-engineering/state/framework-capabilities\.json$''',
  '''\.ai-engineering/state/gate-findings\.json$''',
  '''\.ai-engineering/state/runtime/checkpoint\.json$''',
  '''\.ai-engineering/state/runtime/skills-index\.json$''',
  '''\.ai-engineering/state/runtime/ralph-resume\.json$''',
  # Append-only audit stream — never holds secrets by contract.
  '''\.ai-engineering/state/framework-events\.ndjson$''',
  '''node_modules/''',
  '''\.venv/''',
  '''__pycache__/''',
  '''\.pytest_cache/''',
  '''\.git/''',
]
