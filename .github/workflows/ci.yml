name: Pull request checks

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://lucafregoso.github.io' }}
      BASE_PATH: ${{ vars.BASE_PATH || '/luca-fregoso-personal-website-2026-astro/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check Astro, TypeScript and CMS config
        run: pnpm run check

      - name: Run end-to-end tests
        run: pnpm test
