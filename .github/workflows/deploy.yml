name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel in-progress production runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # If your repo's default branch is "master" not "main",
        # change the trigger above. Node 20 is used by default.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
