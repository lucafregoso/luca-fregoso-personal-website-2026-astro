name: Feature Request
description: Propose a new feature or enhancement
labels: ["feature", "needs-triage"]
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in the framework.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Verifiable conditions for "done".
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Impact level following the project priority mapping.
      options:
        - P0 — Outage / data loss (same day SLA)
        - P1 — Blocking workflow (3 days SLA)
        - P2 — Normal (next sprint SLA)
    validations:
      required: true
  - type: dropdown
    id: pipeline
    attributes:
      label: Pipeline Strategy
      description: Auto-classified from change type. Override if needed.
      options:
        - full (features, refactors, >3 files)
        - standard (enhancements, 3-5 files)
        - hotfix (bug fixes, <3 files)
        - trivial (typos, single-line)
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Estimated impact area.
      options:
        - Skill (single skill change)
        - Agent (agent behavior change)
        - CLI (command-line interface)
        - Installer (setup/config)
        - Standards (governance/quality)
        - Infrastructure (CI/CD, hooks)
    validations:
      required: true
  - type: input
    id: spec-url
    attributes:
      label: Spec URL
      description: Full GitHub URL to the related spec, if applicable.
      placeholder: "https://github.com/arcasilesgroup/ai-engineering/blob/main/.ai-engineering/specs/036-platform-runbooks/spec.md"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Diagrams, examples, or related issues.
    validations:
      required: false
