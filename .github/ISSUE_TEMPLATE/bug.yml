name: Bug Report
description: Report a bug in the ai-engineering framework
labels: ["bug", "needs-triage"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `ai-eng ...`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Impact level following the project priority mapping.
      options:
        - P0 — Outage / data loss (same day SLA)
        - P1 — Blocking workflow (3 days SLA)
        - P2 — Normal (next sprint SLA)
    validations:
      required: true
  - type: input
    id: spec-url
    attributes:
      label: Spec URL
      description: Full GitHub URL to the related spec, if applicable.
      placeholder: "https://github.com/arcasilesgroup/ai-engineering/blob/main/.ai-engineering/specs/036-platform-runbooks/spec.md"
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ai-eng --version`.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or other context.
    validations:
      required: false
