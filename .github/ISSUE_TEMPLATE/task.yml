name: Task
description: Track a specific unit of work
labels: ["chore", "needs-triage"]
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Define a concrete, actionable task.
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: input
    id: spec-url
    attributes:
      label: Spec URL
      description: Full GitHub URL to the related spec.
      placeholder: "https://github.com/arcasilesgroup/ai-engineering/blob/main/.ai-engineering/specs/036-platform-runbooks/spec.md"
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - p1-critical
        - p2-high
        - p3-normal
        - p4-low
    validations:
      required: true
  - type: input
    id: estimate
    attributes:
      label: Estimate (story points)
      description: Fibonacci scale — 1, 2, 3, 5, 8, 13, 21.
      placeholder: "5"
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Dependencies, blockers, or related issues.
    validations:
      required: false
